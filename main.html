<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <section class="hero">
      <h1>Interactive Demo</h1>
      <p>Use the buttons below to apply styling and run JavaScript logic.</p>
      <div class="controls">
        <button id="themeButton" class="button">Toggle Dark Mode</button>
        <button id="messageButton" class="button secondary">Show Message</button>
      </div>
      <div id="message" class="message hidden">Welcome! JavaScript is working.</div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
