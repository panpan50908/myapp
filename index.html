<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Personal Image Quiz</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>📚 Personal Quiz Database</h1>

<div class="menu">

<button onclick="showPage('add')">
➕ Add Question
</button>

<button onclick="showPage('practice')">
🎯 Practice
</button>

<button onclick="showPage('category')">
📂 Categories
</button>

<button onclick="showPage('setting')">
⚙ Settings
</button>

</div>

<!-- ===================== -->
<!-- ADD QUESTION -->
<!-- ===================== -->

<div id="add" class="page">

<h2>Add New Question</h2>

<div class="paste-area" id="pasteArea">

<h3>Paste Screenshot Here</h3>

<p>CTRL + V then Press ENTER</p>

<img id="preview">

</div>

<br>

<label>

Correct Answer

<input
type="text"
id="answer"
placeholder="Example: 4">

</label>

<br><br>

<label>

Question Number

<input
type="text"
id="questionNumber"
placeholder="Optional">

</label>

<br><br>

<label>

Category

<select id="categorySelect">

<option>Math Sequence Puzzle</option>

<option>Spatial Intelligence</option>

<option>Logic</option>

</select>

</label>

<br><br>

<button id="saveButton">

💾 Save Question

</button>

</div>

<!-- ===================== -->
<!-- PRACTICE -->
<!-- ===================== -->

<div id="practice" class="page hidden">

<h2>Practice</h2>

<button class="bigButton">

📖 Whole Database

</button>

<button class="bigButton">

🎲 Random Practice

</button>

<button class="bigButton">

📂 Practice by Category

</button>

</div>

<!-- ===================== -->
<!-- CATEGORY -->
<!-- ===================== -->

<div id="category" class="page hidden">

<h2>Manage Categories</h2>

<input
type="text"
id="newCategory"
placeholder="New Category">

<button>

Add Category

</button>

<ul id="categoryList">

<li>
Math Sequence Puzzle
<button>Delete</button>
</li>

<li>
Spatial Intelligence
<button>Delete</button>
</li>

<li>
Logic
<button>Delete</button>
</li>

</ul>

</div>

<!-- ===================== -->
<!-- SETTINGS -->
<!-- ===================== -->



Auto Fill Question Number

</label>

</div>

</div>

<script>

function showPage(page){

document.querySelectorAll(".page").forEach(p=>{

p.classList.add("hidden")

})

document.getElementById(page).classList.remove("hidden")

}

</script>
<div id="practiceBox">

    <img id="practiceImage" width="300">

    <br><br>

    <input
        type="text"
        id="userAnswer"
        placeholder="Your answer">

    <button id="checkAnswerBtn">
        Check
    </button>

    <h3 id="resultText"></h3>

    <h3 id="scoreText">
        Score: 0 / 0
    </h3>

    <br>

    <button id="prevBtn">
        Previous
    </button>

    <button id="nextBtn">
        Next
    </button>

    <button id="randomBtn">
        Random
    </button>

</div>
<script src="https://unpkg.com/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="script.js"></script>
</body>
</html>
